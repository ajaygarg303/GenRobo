# Whole-project build: one Docker image (Vite frontend + FastAPI) for local verify and ECS.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t business-chatbot:ci .
